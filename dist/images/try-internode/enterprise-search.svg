<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" rx="16" fill="url(#bg)"/>

  <!-- Main search card -->
  <rect x="80" y="30" width="640" height="440" rx="16" fill="url(#card)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Search bar -->
  <rect x="120" y="60" width="560" height="48" rx="24" fill="white" stroke="#c7d2fe" stroke-width="2"/>
  <circle cx="150" cy="84" r="14" fill="none" stroke="#6366f1" stroke-width="2"/>
  <line x1="160" y1="94" x2="167" y2="101" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <text x="180" y="89" font-size="14" fill="#1e293b" font-family="system-ui">Why did we postpone the mobile app launch?</text>

  <!-- Source pills -->
  <text x="120" y="134" font-size="11" fill="#64748b" font-family="system-ui" font-weight="600">SEARCHING ACROSS</text>
  <rect x="254" y="120" width="64" height="24" rx="12" fill="#dbeafe"/>
  <text x="286" y="136" text-anchor="middle" font-size="10" fill="#3b82f6" font-family="system-ui" font-weight="500">Slack</text>
  <rect x="326" y="120" width="78" height="24" rx="12" fill="#fce7f3"/>
  <text x="365" y="136" text-anchor="middle" font-size="10" fill="#ec4899" font-family="system-ui" font-weight="500">Meetings</text>
  <rect x="412" y="120" width="60" height="24" rx="12" fill="#d1fae5"/>
  <text x="442" y="136" text-anchor="middle" font-size="10" fill="#059669" font-family="system-ui" font-weight="500">Jira</text>
  <rect x="480" y="120" width="70" height="24" rx="12" fill="#fef3c7"/>
  <text x="515" y="136" text-anchor="middle" font-size="10" fill="#d97706" font-family="system-ui" font-weight="500">Notion</text>
  <rect x="558" y="120" width="64" height="24" rx="12" fill="#ede9fe"/>
  <text x="590" y="136" text-anchor="middle" font-size="10" fill="#7c3aed" font-family="system-ui" font-weight="500">Email</text>

  <!-- AI Answer card -->
  <rect x="120" y="160" width="560" height="100" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <rect x="136" y="172" width="56" height="20" rx="4" fill="#6366f1"/>
  <text x="164" y="186" text-anchor="middle" font-size="10" fill="white" font-family="system-ui" font-weight="600">AI Answer</text>
  <text x="136" y="210" font-size="12" fill="#1e293b" font-family="system-ui">The mobile app launch was postponed from Q1 to Q3 due to three factors:</text>
  <text x="136" y="228" font-size="12" fill="#475569" font-family="system-ui">API stability concerns (eng review, Jan 20), resource reallocation to enterprise</text>
  <text x="136" y="244" font-size="12" fill="#475569" font-family="system-ui">features (PM sync, Feb 3), and pending security audit (CTO decision, Feb 10).</text>

  <!-- Search results -->
  <!-- Result 1 -->
  <rect x="120" y="274" width="560" height="56" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="136" y="286" width="48" height="18" rx="4" fill="#dbeafe"/>
  <text x="160" y="299" text-anchor="middle" font-size="9" fill="#3b82f6" font-family="system-ui" font-weight="500">Meeting</text>
  <text x="196" y="299" font-size="12" fill="#1e293b" font-family="system-ui" font-weight="600">Engineering Review  Jan 20, 2026</text>
  <text x="136" y="318" font-size="11" fill="#64748b" font-family="system-ui">"...API endpoints aren't stable enough for a public mobile client. Postponing..."</text>
  <rect x="624" y="286" width="40" height="18" rx="4" fill="#dcfce7"/>
  <text x="644" y="299" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui" font-weight="600">98%</text>

  <!-- Result 2 -->
  <rect x="120" y="340" width="560" height="56" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="136" y="352" width="48" height="18" rx="4" fill="#fce7f3"/>
  <text x="160" y="365" text-anchor="middle" font-size="9" fill="#ec4899" font-family="system-ui" font-weight="500">Slack</text>
  <text x="196" y="365" font-size="12" fill="#1e293b" font-family="system-ui" font-weight="600">#product-decisions  Feb 3, 2026</text>
  <text x="136" y="384" font-size="11" fill="#64748b" font-family="system-ui">"Shifting mobile team to enterprise SSO integration. Mobile moves to Q3."</text>
  <rect x="624" y="352" width="40" height="18" rx="4" fill="#dcfce7"/>
  <text x="644" y="365" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui" font-weight="600">94%</text>

  <!-- Result 3 -->
  <rect x="120" y="406" width="560" height="48" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="136" y="416" width="48" height="18" rx="4" fill="#ede9fe"/>
  <text x="160" y="429" text-anchor="middle" font-size="9" fill="#7c3aed" font-family="system-ui" font-weight="500">Email</text>
  <text x="196" y="429" font-size="12" fill="#1e293b" font-family="system-ui" font-weight="600">CTO to VP Eng  Feb 10, 2026</text>
  <text x="136" y="446" font-size="11" fill="#64748b" font-family="system-ui">"Final call: mobile waits for security audit completion. Target Q3 launch."</text>
  <rect x="624" y="416" width="40" height="18" rx="4" fill="#dcfce7"/>
  <text x="644" y="429" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui" font-weight="600">91%</text>
</svg>
